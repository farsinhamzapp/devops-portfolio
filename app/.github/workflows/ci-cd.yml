name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------
  # 1. Run tests. If this fails, nothing else runs.
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./app
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ./app
        run: pytest -v

  # ---------------------------------------------------------
  # 2. Build the Docker image and push it to GitHub Container
  #    Registry (GHCR), tagged with the commit SHA.
  # ---------------------------------------------------------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}

  # ---------------------------------------------------------
  # 3. Spin up a throwaway Kubernetes cluster, deploy the image
  #    into it with Terraform, and smoke test it. This proves
  #    the image + manifests actually work together, not just
  #    that they exist.
  # ---------------------------------------------------------
  deploy-and-smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci-cluster

      - name: Log in to GHCR (so the cluster can pull the image)
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=default

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="app_image=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="kube_context=kind-ci-cluster"

      - name: Wait for rollout
        run: kubectl rollout status deployment/devops-demo-api -n devops-demo --timeout=120s

      - name: Smoke test
        run: |
          kubectl port-forward -n devops-demo service/devops-demo-api 8080:80 &
          sleep 5
          curl --fail http://localhost:8080/health

      - name: Show pods (debug info on failure)
        if: failure()
        run: |
          kubectl get pods -n devops-demo
          kubectl describe pods -n devops-demo
          kubectl logs -n devops-demo -l app=devops-demo-api --tail=50
